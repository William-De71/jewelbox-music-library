name: Build dev images

on:
  push:
    branches: [dev]
    paths:
      - 'docker/**'
      - 'server/**'
      - 'client/**'
      - 'package*.json'
      - '.github/workflows/docker-dev-build.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker Tag to build'
        required: true
        default: 'dev'
      platforms:
        description: 'Docker platform to build'
        required: true
        default: 'linux/amd64,linux/arm64'

jobs:
  build-front:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 💽 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build frontend
        working-directory: ./client
        run: node ../node_modules/vite/bin/vite.js build

      - name: ↗️ Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist

  docker:
    needs: build-front
    name: Docker build and push
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{secrets.DOCKERHUB_USER}}
      DOCKERHUB_PASSWORD: ${{secrets.DOCKERHUB_PASSWORD}}
      DOCKERHUB_REPO: ${{secrets.DOCKERHUB_REPO}}

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_REPO }}
          tags: |
            type=raw,value=${{ github.event.inputs.tag || 'dev' }}
            type=sha,prefix=dev-
          labels: |
            org.opencontainers.image.title=JewelBox Music Library Dev Image

      - name: 💽 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ↙️ Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist

      - name: 🔑 Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: 🐳 Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.buildx
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64' }}
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

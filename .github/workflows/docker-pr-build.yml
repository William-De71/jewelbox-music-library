name: Pull request tests
run-name: Pull request tests ${{ github.head_ref }}

on:
  pull_request:
    branches: [main]
    paths:
      - 'docker/**'
      - 'server/**'
      - 'client/**'
      - 'package*.json'
      - '.github/workflows/docker-pr-build.yml'

jobs:
  test-server:
    name: Server tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run server tests
        run: node node_modules/vitest/vitest.mjs run
        working-directory: server

  test-client:
    name: Client tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run client tests
        run: node ../node_modules/vitest/vitest.mjs run
        working-directory: client

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test-server, test-client]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.buildx
          push: false
          tags: jewelbox:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment PR with build status
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ Build successful' : '❌ Build failed';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Docker Build\n\n${status}\n\nTag: \`jewelbox:pr-${{ github.event.pull_request.number }}\``
            });

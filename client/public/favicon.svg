<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2878d4"/>
      <stop offset="100%" stop-color="#1456aa"/>
    </linearGradient>
    <radialGradient id="vinyl" cx="38%" cy="33%" r="65%">
      <stop offset="0%" stop-color="#2c2c48"/>
      <stop offset="100%" stop-color="#08081a"/>
    </radialGradient>
    <linearGradient id="gem-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b8d4ff"/>
    </linearGradient>
    <linearGradient id="gem-bot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0e8ff"/>
      <stop offset="100%" stop-color="#7ab0e8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Vinyl record -->
  <circle cx="50" cy="50" r="37" fill="url(#vinyl)"/>

  <!-- Groove rings -->
  <circle cx="50" cy="50" r="33" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.07"/>
  <circle cx="50" cy="50" r="27" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.07"/>
  <circle cx="50" cy="50" r="21" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.07"/>

  <!-- Vinyl highlight (shine arc) -->
  <path d="M21 43 Q25 23 43 17" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.13"/>

  <!-- Center label -->
  <circle cx="50" cy="50" r="13" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="13" fill="black" opacity="0.15"/>

  <!-- Diamond gem: top facets -->
  <polygon points="50,38 43,46 57,46" fill="url(#gem-top)"/>
  <!-- Diamond gem: left facet -->
  <polygon points="43,46 50,62 50,46" fill="#a8ccf0"/>
  <!-- Diamond gem: right facet -->
  <polygon points="57,46 50,62 50,46" fill="url(#gem-bot)"/>
  <!-- Diamond gem: top highlight -->
  <polygon points="50,38 53,43 50,43" fill="white" opacity="0.55"/>
</svg>
